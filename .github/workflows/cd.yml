name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  publish-image:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yamata-no-orochi
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.event.workflow_run.head_branch == 'main' }}
            type=raw,value=master,enable=${{ github.event.workflow_run.head_branch == 'master' }}
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment manifest
        run: |
          cat <<EOF > deployment-manifest.txt
          repository=${{ github.repository }}
          commit=${{ github.event.workflow_run.head_sha || github.sha }}
          image=ghcr.io/${{ github.repository_owner }}/yamata-no-orochi
          tags=${{ steps.meta.outputs.tags }}
          digest=${{ steps.build.outputs.digest }}
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment-manifest.txt
