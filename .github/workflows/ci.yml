name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Verify formatting
        run: make ci-fmt-check

      - name: Run go vet
        run: go vet ./...

      - name: Run maintained test subset
        run: make ci-test

      - name: Build application binary
        run: make ci-build

      - name: Build production Docker image
        run: docker build -f docker/Dockerfile.production -t yamata-no-orochi:ci .
