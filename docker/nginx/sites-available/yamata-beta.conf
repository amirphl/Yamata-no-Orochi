# Upstream definitions for beta environment
upstream yamata_backend {
    least_conn;
    server app-beta:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Metrics and monitoring backend
upstream yamata_metrics {
    server app-beta:9090 max_fails=3 fail_timeout=30s;
}

# Frontend upstream
upstream frontend {
    server frontend-beta:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Sentry UI upstream
upstream sentry_ui {
    server sentry-beta:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# HTTP Server - Redirect landing subdomain to main domain /landing
server {
    listen 80;
    listen [::]:80;
    server_name landing.${DOMAIN};

    return 301 https://${DOMAIN}/landing$request_uri;
}

# HTTP Server - Redirect main domain traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN} www.${DOMAIN};

    return 301 https://${DOMAIN}$request_uri;
}

# HTTPS Main Application Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN} www.${DOMAIN} landing.${DOMAIN};
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    limit_conn conn_limit_per_ip 100;

    # landing subdomain redirect safety on HTTPS
    if ($host = landing.${DOMAIN}) {
        return 301 https://${DOMAIN}/landing$request_uri;
    }

    # Health check endpoint (no rate limiting)
    location = /health {
        access_log off;
        proxy_pass http://yamata_backend/api/v1/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Auth endpoints with stricter rate limiting.
    location ^~ /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
    }

    # Increase body size for short-links CSV upload.
    location = /api/v1/admin/short-links/upload-csv {
        client_max_body_size 50m;
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
    }

    # Increase response timeouts for campaign click-report CSV (may be 10-15MB for large campaigns).
    location ~ ^/api/v1/campaigns/[^/]+/click-report$ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
    }

    # Increase body size and timeouts for multimedia upload.
    location = /api/v1/media/upload {
        client_max_body_size 100m;
        limit_req zone=api burst=100 nodelay;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
    }

    # Increase timeouts for multimedia download.
    location ^~ /api/v1/media/ {
        limit_req zone=api burst=100 nodelay;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
    }

    # Increase body size and timeouts for bot audience UID batch upload.
    location ~ ^/api/v1/bot/campaigns/[^/]+/audience-uids$ {
        client_max_body_size 100m;
        limit_req zone=api burst=100 nodelay;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
    }

    # Default API handling. ^~ prevents frontend static regex locations from hijacking API paths.
    location ^~ /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
    }
    
    # Metrics endpoint - Backend only serves this
    location = /metrics {
        allow 127.0.0.1;
        allow 172.20.0.0/24;
        deny all;
        
        proxy_pass http://yamata_metrics;
        include /etc/nginx/proxy.conf;
    }
    
    # Root path - serve frontend directly
    location = / {
        limit_req zone=general burst=100 nodelay;
        
        access_log /var/log/nginx/frontend_access.log;
        error_log /var/log/nginx/frontend_error.log warn;
        
        proxy_pass http://frontend/;
        include /etc/nginx/proxy.conf;
        
        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 = @fallback;
    }
    # Hashed/static assets can be cached aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        limit_req zone=general burst=100 nodelay;
        
        proxy_pass http://frontend;
        include /etc/nginx/proxy.conf;
        
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/security.conf;
    }

    # HTML and app metadata should be revalidated so releases are picked up.
    location ~* \.(html|json|webmanifest)$ {
        limit_req zone=general burst=100 nodelay;

        proxy_pass http://frontend;
        include /etc/nginx/proxy.conf;

        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/security.conf;
    }
    
    # All other requests go to frontend (React Router fallback)
    location / {
        limit_req zone=general burst=100 nodelay;
        
        access_log /var/log/nginx/frontend_access.log;
        error_log /var/log/nginx/frontend_error.log warn;
        
        proxy_pass http://frontend;
        include /etc/nginx/proxy.conf;
        
        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 = @fallback;
    }
    
    # Fallback location for frontend errors
    location @fallback {
        return 503 "Frontend service temporarily unavailable";
    }
}

# HTTP Server for Monitoring - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ${MONITORING_DOMAIN};

    return 301 https://${MONITORING_DOMAIN}$request_uri;
}

# HTTP Server for Sentry - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ${SENTRY_UI_DOMAIN};

    return 301 https://${SENTRY_UI_DOMAIN}$request_uri;
}

# HTTPS Sentry UI
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${SENTRY_UI_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    client_max_body_size 20m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://sentry_ui;
        include /etc/nginx/proxy.conf;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# Monitoring Server (Public Grafana, restricted Prometheus)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${MONITORING_DOMAIN};
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Prometheus (restricted by IP)
    location /prometheus/ {
        allow 127.0.0.1;
        allow 172.20.0.0/24;
        deny all;
        proxy_pass http://prometheus-beta:9090/;
        include /etc/nginx/proxy.conf;
    }
    
    # Grafana (public access, relies on Grafana auth)
    location /grafana/ {
        limit_req zone=general burst=100 nodelay;
        proxy_pass http://grafana-beta:3000/;
        include /etc/nginx/proxy.conf;
    }
    
    location /grafana/api/live/ {
        limit_req zone=general burst=100 nodelay;
        proxy_pass http://grafana-beta:3000/api/live/;
        include /etc/nginx/proxy.conf;
    }
    
    # Application metrics (restricted by IP)
    location /metrics/ {
        allow 127.0.0.1;
        allow 172.20.0.0/24;
        deny all;
        proxy_pass http://yamata_metrics/;
        include /etc/nginx/proxy.conf;
    }
    
    # Nginx status (restricted by IP)
    location = /nginx_status {
        allow 127.0.0.1;
        allow 172.20.0.0/24;
        deny all;
        stub_status on;
        access_log off;
    }

    location / {
        return 404;
    }
}

# HTTP Server for jaazebeh.ir - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jaazebeh.ir www.jaazebeh.ir;

    location / {
        return 301 https://jaazebeh.ir$request_uri;
    }
}

# HTTPS Static Site for jaazebeh.ir
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jaazebeh.ir www.jaazebeh.ir;

    # SSL Configuration (hardcoded domain certificate)
    ssl_certificate /etc/letsencrypt/live/jaazebeh.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jaazebeh.ir/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/jaazebeh.ir/chain.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Static files root (mount docker/public -> /var/www/jaazebeh in container)
    root /var/www/jaazebeh;
    index home.html;

    # Serve homepage
    location = / {
        try_files /home.html =404;
    }

    # Serve contact page at /contact and /contact.html
    location = /contact {
        try_files /contact.html =404;
    }

    location = /contact.html {
        try_files /contact.html =404;
    }

    # Static assets (if referenced by the pages)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        include /etc/nginx/security.conf;
    }
}

# HTTP Server for jo1n.ir - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jo1n.ir www.jo1n.ir;

    location / {
        return 301 https://jo1n.ir$request_uri;
    }
}

# HTTPS server for jo1n.ir - Allow /<uid> and /s/<uid>, block others
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jo1n.ir www.jo1n.ir;

    # SSL Configuration (hardcoded domain certificate)
    ssl_certificate /etc/letsencrypt/live/jo1n.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jo1n.ir/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/jo1n.ir/chain.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Allow /<uid> and /s/<uid>, block everything else
    location = /favicon.ico { return 404; }
    location = /robots.txt { return 404; }

    location ~ "^/(s/)?[A-Za-z0-9_-]{4,64}$" {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://yamata_backend;
        include /etc/nginx/proxy.conf;
    }

    # Block everything else
    location / {
        return 404;
    }
}

