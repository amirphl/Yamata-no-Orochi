# Nginx Configuration for Yamata no Orochi Production
user nginx;
worker_processes auto;
worker_rlimit_nofile 65536;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Request ID (reuse incoming X-Request-ID or generate a new one)
    map $http_x_request_id $req_id {
        default   $http_x_request_id;
        ""        $request_id;
    }

    # Basic Settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging Format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" "$req_id"';
    
    log_format json_combined escape=json
        '{'
            '"time_local":"$time_local",'
            '"host":"$host",'
            '"scheme":"$scheme",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request",'
            '"status": "$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_real_ip":"$http_x_real_ip",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"http_x_forwarded_proto":"$http_x_forwarded_proto",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_response_length":"$upstream_response_length",'
            '"request_id":"$req_id"'
        '}';
    
    access_log /var/log/nginx/access.log json_combined;
    
    # Performance Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    
    # File Cache (Optimized for High Load)
    open_file_cache max=10000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    
    # Buffer Settings (Optimized for High Load)
    client_body_buffer_size 256k;
    client_max_body_size 10m;
    client_header_buffer_size 2k;
    large_client_header_buffers 8 8k;
    
    # Proxy Headers Hash Settings
    proxy_headers_hash_max_size 1024;
    proxy_headers_hash_bucket_size 128;
    
    # Timeout Settings (Optimized for High Load)
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;
    
    # Rate Limiting (Optimized for High Load)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;
    limit_req_status 429;
    
    # Connection Limiting (Optimized for High Load)
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_conn_status 429;
    
    # Security Headers (Global) - Defined in security.conf
    
    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }
    
    # Include additional configurations
    include /etc/nginx/security.conf;
    include /etc/nginx/gzip.conf;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # SSL Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # OCSP resolver
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;
    
    # Include site configurations
    include /etc/nginx/sites-available/*.conf;
    
    # Default server (catch-all) - drop connections for unrecognised Host headers
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
    }
} 
