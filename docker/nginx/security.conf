# Public security headers. This file is safe at http, server, or location scope.
# The edge image includes headers-more; stock nginx:alpine does not.

server_tokens off;
more_clear_headers Server;
more_clear_headers X-Powered-By;
more_clear_headers Content-Security-Policy;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
add_header X-Download-Options "noopen" always;

# The frontend bundles scripts, styles, and fonts locally. The only remote
# image is the eNamad seal and the only remote form target is the payment
# gateway. There are no wildcard schemes, unsafe-inline, or unsafe-eval.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self' https://mipg.atipay.net; script-src 'self'; script-src-attr 'none'; style-src 'self' 'sha256-7ISJtRqQJ7tmxQr12o/kAQKjtIDVwveWdroeO7wrc1w='; style-src-attr 'none'; img-src 'self' data: blob: https://trustseal.enamad.ir; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-src 'none'; media-src 'self' blob:" always;
