# Nginx configuration for the production React application. TLS terminates at
# the edge proxy; this server is reachable only on the private Compose network.

# Load Alpine-packaged dynamic modules, including headers-more.
include /etc/nginx/modules/*.conf;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/cache/nginx/nginx.pid;
worker_rlimit_nofile 65536;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    reset_timedout_connection on;
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
    scgi_temp_path /var/cache/nginx/scgi_temp;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Remove product disclosure at this layer as well as at the public edge.
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Keep this policy in sync with docker/nginx/security.conf. The edge is
        # the authoritative public copy and hides this upstream copy.
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self' https://mipg.atipay.net; script-src 'self'; script-src-attr 'none'; style-src 'self' 'sha256-7ISJtRqQJ7tmxQr12o/kAQKjtIDVwveWdroeO7wrc1w='; style-src-attr 'none'; img-src 'self' data: blob: https://trustseal.enamad.ir; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-src 'none'; media-src 'self' blob:" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header X-Download-Options "noopen" always;

        # A static frontend only needs retrieval methods. API/CORS traffic is
        # routed to the API service by the edge proxy before reaching here.
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        location = /health {
            access_log off;
            default_type text/plain;
            expires -1;
            return 200 "healthy\n";
        }

        location = /manifest.json {
            expires -1;
            try_files $uri =404;
        }

        # Reject ZAP backup-file probes instead of serving the SPA fallback.
        # Nginx decodes percent-encoded spaces before location matching.
        location ~ "\s" {
            return 404;
        }

        location ~* "(?:~|\.(?:bak|backup|bkp|copy|old|orig|original|save|saved|swp|swo|tmp|temp))$" {
            return 404;
        }

        # Never expose hidden, configuration, source, key, archive, database,
        # package-manager, or operating-system metadata files.
        location ~ /\. {
            return 404;
        }

        location ~* "\.(?:conf|config|env|ini|log|sql|sqlite|sqlite3|db|ya?ml|xml|php|asp|aspx|jsp|cgi|pl|py|rb|sh|bash|bat|cmd|ps1|pem|key|crt|csr|p12|pfx|zip|tar|gz|bz2|rar|7z|npmrc|yarnrc)$" {
            return 404;
        }

        location ~* /(?:nginx_status|server[_-](?:info|status)|php[_-](?:info|status)|apache[_-](?:info|status)|mod_(?:info|status))$ {
            return 404;
        }

        location ~* \.html$ {
            expires -1;
            try_files $uri =404;
        }

        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|xls)$ {
            expires 1y;
            try_files $uri =404;
        }

        location / {
            expires -1;
            try_files $uri $uri/ /index.html;
        }

        # Product-neutral error bodies prevent method/error fingerprinting.
        error_page 400 = /400.txt;
        error_page 403 = /403.txt;
        error_page 404 = /404.txt;
        error_page 405 = /405.txt;
        error_page 500 502 503 504 = /500.txt;

        location = /400.txt { internal; default_type text/plain; return 400 "Bad request\n"; }
        location = /403.txt { internal; default_type text/plain; return 403 "Forbidden\n"; }
        location = /404.txt { internal; default_type text/plain; return 404 "Not found\n"; }
        location = /405.txt { internal; default_type text/plain; return 405 "Method not allowed\n"; }
        location = /500.txt { internal; default_type text/plain; return 500 "Server error\n"; }
    }
}
