global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Both slots are listed; only the currently-active slot will be reachable.
  # The inactive slot shows up as down in Prometheus, which is expected.
  - job_name: 'yamata_app'
    metrics_path: /metrics
    static_configs:
      - targets: ['app-blue:9090', 'app-green:9090']

  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres-exporter-beta:9187']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter-beta:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor-beta:8080'] 