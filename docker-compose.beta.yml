networks:
  yamata-network-beta:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data_beta:
    driver: local
  redi_data_beta:
    driver: local
  nginx_logs_beta:
    driver: local
  app_logs_beta:
    driver: local
  uploads_beta:
    driver: local
  prometheus_data_beta:
    driver: local
  grafana_data_beta:
    driver: local
  frontend_logs_beta:
    driver: local
  postgres_backups_beta:
    driver: local
  sentry_postgres_data_beta:
    driver: local
  sentry_redis_data_beta:
    driver: local

services:
  # PostgreSQL Database
  postgres-beta:
    image: postgres:15-alpine
    container_name: yamata-postgres-beta
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data_beta:/var/lib/postgresql/data
      - ./docker/postgres/init-beta-processed.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/postgres/init-database-beta-processed.sql:/docker-entrypoint-initdb.d/02-init-database.sql:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./migrations:/migrations:ro
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.10
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  # Redis Cache
  redis-beta:
    image: redis:8.0.3-alpine
    container_name: yamata-redis-beta
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redi_data_beta:/data
      # - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.11
    # command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      # test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # Postgres daily backup
  postgres-backup-beta:
    image: postgres:15-alpine
    container_name: yamata-postgres-backup-beta
    restart: unless-stopped
    depends_on:
      postgres-beta:
        condition: service_healthy
    environment:
      DB_HOST: postgres-beta
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    command: >
      sh -c '
        set -euo pipefail
        mkdir -p /backups
        while true; do
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          export PGPASSWORD="${DB_PASSWORD}"
          pg_dump -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER}" -d "${DB_NAME}" -Fc -f "/backups/${DB_NAME}-$${ts}.dump"
          echo "[backup] $(date -u +%Y-%m-%dT%H:%M:%SZ) backup completed: ${DB_NAME}-$${ts}.dump"
          sleep "${BACKUP_INTERVAL_SECONDS:-86400}"
        done
      '
    volumes:
      - postgres_backups_beta:/backups
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.92
    security_opt:
      - no-new-privileges:true

  # Sentry-compatible error tracking (GlitchTip)
  sentry-postgres-beta:
    image: postgres:15-alpine
    container_name: yamata-sentry-postgres-beta
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SENTRY_POSTGRES_DB}
      POSTGRES_USER: ${SENTRY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SENTRY_POSTGRES_PASSWORD}
    volumes:
      - sentry_postgres_data_beta:/var/lib/postgresql/data
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.12
    security_opt:
      - no-new-privileges:true

  sentry-redis-beta:
    image: redis:8.0.3-alpine
    container_name: yamata-sentry-redis-beta
    restart: unless-stopped
    volumes:
      - sentry_redis_data_beta:/data
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.13
    security_opt:
      - no-new-privileges:true

  sentry-beta:
    image: glitchtip/glitchtip:latest
    container_name: yamata-sentry-beta
    restart: unless-stopped
    depends_on:
      - sentry-postgres-beta
      - sentry-redis-beta
    environment:
      DATABASE_URL: postgres://${SENTRY_POSTGRES_USER}:${SENTRY_POSTGRES_PASSWORD}@sentry-postgres-beta:5432/${SENTRY_POSTGRES_DB}
      REDIS_URL: redis://sentry-redis-beta:6379/0
      SECRET_KEY: ${SENTRY_GLITCHTIP_SECRET_KEY}
      PORT: 8000
      GLITCHTIP_DOMAIN: ${SENTRY_URL_PREFIX}
      ALLOWED_HOSTS: ${SENTRY_ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${SENTRY_URL_PREFIX}
      DEFAULT_FROM_EMAIL: ${SENTRY_DEFAULT_FROM_EMAIL}
      ENABLE_USER_REGISTRATION: ${SENTRY_ENABLE_USER_REGISTRATION}
      ENABLE_OPEN_USER_REGISTRATION: ${SENTRY_ENABLE_OPEN_USER_REGISTRATION}
      DJANGO_SUPERUSER_USERNAME: ${SENTRY_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_PASSWORD: ${SENTRY_SUPERUSER_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: ${SENTRY_SUPERUSER_EMAIL}
      EMAIL_URL: ${SENTRY_EMAIL_URL}
      SERVER_ROLE: all_in_one
    command: ["./bin/start.sh"]
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.14
    security_opt:
      - no-new-privileges:true

  # Application
  app-beta:
    image: yamata-no-orochi
    container_name: yamata-app-beta
    restart: unless-stopped
    depends_on:
      postgres-beta:
        condition: service_healthy
      redis-beta:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_HOST: postgres-beta
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL_MODE: ${DB_SSL_MODE}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME}
      DB_SLOW_QUERY_LOG: ${DB_SLOW_QUERY_LOG}
      DB_SLOW_QUERY_TIME: ${DB_SLOW_QUERY_TIME}

      # Server Configuration
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PORT: ${SERVER_PORT}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT}
      SERVER_IDLE_TIMEOUT: ${SERVER_IDLE_TIMEOUT}
      SERVER_SHUTDOWN_TIMEOUT: ${SERVER_SHUTDOWN_TIMEOUT}
      SERVER_BODY_LIMIT: ${SERVER_BODY_LIMIT}
      SERVER_ENABLE_PPROF: ${SERVER_ENABLE_PPROF}
      SERVER_ENABLE_METRICS: ${SERVER_ENABLE_METRICS}
      SERVER_TRUSTED_PROXIES: ${SERVER_TRUSTED_PROXIES}
      SERVER_PROXY_HEADER: ${SERVER_PROXY_HEADER}
      SERVER_ENABLE_COMPRESSION: ${SERVER_ENABLE_COMPRESSION}
      SERVER_COMPRESSION_LEVEL: ${SERVER_COMPRESSION_LEVEL}

      # Security Configuration
      TLS_ENABLED: ${TLS_ENABLED}
      TLS_CERT_FILE: ${TLS_CERT_FILE}
      TLS_KEY_FILE: ${TLS_KEY_FILE}
      TLS_MIN_VERSION: ${TLS_MIN_VERSION}
      HSTS_MAX_AGE: ${HSTS_MAX_AGE}
      HSTS_INCLUDE_SUBDOMAINS: ${HSTS_INCLUDE_SUBDOMAINS}
      HSTS_PRELOAD: ${HSTS_PRELOAD}

      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS}
      CORS_MAX_AGE: ${CORS_MAX_AGE}

      # Rate Limiting
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT}
      GLOBAL_RATE_LIMIT: ${GLOBAL_RATE_LIMIT}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW}
      RATE_LIMIT_MEMORY: ${RATE_LIMIT_MEMORY}

      # Content Security Policy
      CSP_POLICY: ${CSP_POLICY}
      X_FRAME_OPTIONS: ${X_FRAME_OPTIONS}
      X_CONTENT_TYPE_OPTIONS: ${X_CONTENT_TYPE_OPTIONS}
      XSS_PROTECTION: ${XSS_PROTECTION}
      REFERRER_POLICY: ${REFERRER_POLICY}

      # API Security
      REQUIRE_API_KEY: ${REQUIRE_API_KEY}
      API_KEY_HEADER: ${API_KEY_HEADER}
      ALLOWED_API_KEYS: ${ALLOWED_API_KEYS}
      IP_WHITELIST: ${IP_WHITELIST}
      IP_BLACKLIST: ${IP_BLACKLIST}

      # Password & Authentication
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH}
      PASSWORD_REQUIRE_UPPER: ${PASSWORD_REQUIRE_UPPER}
      PASSWORD_REQUIRE_LOWER: ${PASSWORD_REQUIRE_LOWER}
      PASSWORD_REQUIRE_NUMBER: ${PASSWORD_REQUIRE_NUMBER}
      PASSWORD_REQUIRE_SYMBOL: ${PASSWORD_REQUIRE_SYMBOL}
      BCRYPT_COST: ${BCRYPT_COST}

      # JWT Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_USE_RSA_KEYS: ${JWT_USE_RSA_KEYS}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ALGORITHM: ${JWT_ALGORITHM}

      # Session Security
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      SESSION_COOKIE_HTTPONLY: ${SESSION_COOKIE_HTTPONLY}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT}
      SESSION_CLEANUP_INTERVAL: ${SESSION_CLEANUP_INTERVAL}

      # SMS Configuration
      SMS_PROVIDER_DOMAIN: ${SMS_PROVIDER_DOMAIN}
      SMS_API_KEY: ${SMS_API_KEY}
      SMS_SOURCE_NUMBER: ${SMS_SOURCE_NUMBER}
      SMS_RETRY_COUNT: ${SMS_RETRY_COUNT}
      SMS_VALIDITY_PERIOD: ${SMS_VALIDITY_PERIOD}
      SMS_TIMEOUT: ${SMS_TIMEOUT}

      # Email Configuration
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM_EMAIL: ${EMAIL_FROM_EMAIL}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_USE_STARTTLS: ${EMAIL_USE_STARTTLS}
      EMAIL_RATE_LIMIT: ${EMAIL_RATE_LIMIT}
      EMAIL_RETRY_ATTEMPTS: ${EMAIL_RETRY_ATTEMPTS}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT}

      # Logging Configuration
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
      LOG_OUTPUT: ${LOG_OUTPUT}
      LOG_FILE_PATH: ${LOG_FILE_PATH}
      LOG_MAX_SIZE: ${LOG_MAX_SIZE}
      LOG_MAX_BACKUPS: ${LOG_MAX_BACKUPS}
      LOG_MAX_AGE: ${LOG_MAX_AGE}
      LOG_COMPRESS: ${LOG_COMPRESS}
      LOG_ENABLE_CALLER: ${LOG_ENABLE_CALLER}
      LOG_ENABLE_STACKTRACE: ${LOG_ENABLE_STACKTRACE}
      LOG_ENABLE_ACCESS: ${LOG_ENABLE_ACCESS}
      LOG_ACCESS_PATH: ${LOG_ACCESS_PATH}
      LOG_ACCESS_FORMAT: ${LOG_ACCESS_FORMAT}
      LOG_ENABLE_AUDIT: ${LOG_ENABLE_AUDIT}
      LOG_AUDIT_PATH: ${LOG_AUDIT_PATH}
      LOG_ENABLE_SECURITY: ${LOG_ENABLE_SECURITY}
      LOG_SECURITY_PATH: ${LOG_SECURITY_PATH}

      # Metrics Configuration
      METRICS_ENABLED: ${METRICS_ENABLED}
      METRICS_PORT: ${METRICS_PORT}
      METRICS_PATH: ${METRICS_PATH}
      METRICS_ENABLE_PPROF: ${METRICS_ENABLE_PPROF}
      METRICS_PPROF_PORT: ${METRICS_PPROF_PORT}
      METRICS_ENABLE_PROMETHEUS: ${METRICS_ENABLE_PROMETHEUS}
      METRICS_PROMETHEUS_PATH: ${METRICS_PROMETHEUS_PATH}
      METRICS_COLLECT_DB: ${METRICS_COLLECT_DB}
      METRICS_COLLECT_CACHE: ${METRICS_COLLECT_CACHE}
      METRICS_COLLECT_APP: ${METRICS_COLLECT_APP}

      # Ensure libraries that need cache write to tmpfs, not $HOME
      XDG_CACHE_HOME: /tmp

      # Cache Configuration
      CACHE_ENABLED: ${CACHE_ENABLED}
      CACHE_PROVIDER: ${CACHE_PROVIDER}
      CACHE_REDIS_URL: redis://redis-beta:6379
      CACHE_REDIS_DB: ${CACHE_REDIS_DB}
      CACHE_REDIS_PREFIX: ${CACHE_REDIS_PREFIX}
      CACHE_DEFAULT_TTL: ${CACHE_DEFAULT_TTL}
      CACHE_MAX_MEMORY: ${CACHE_MAX_MEMORY}
      CACHE_CLEANUP_INTERVAL: ${CACHE_CLEANUP_INTERVAL}

      # Deployment Configuration
      DOMAIN: ${DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      MONITORING_DOMAIN: ${MONITORING_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY}
      APP_ENV: ${APP_ENV}
      VERSION: ${VERSION:-1.0.0}
      COMMIT_HASH: ${COMMIT_HASH:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
      SENTRY_RELEASE: ${SENTRY_RELEASE}
      SENTRY_SERVER_NAME: ${SENTRY_SERVER_NAME}
      SENTRY_TIMEOUT: ${SENTRY_TIMEOUT}
      SENTRY_CAPTURE_4XX: ${SENTRY_CAPTURE_4XX}
      SENTRY_CAPTURE_5XX: ${SENTRY_CAPTURE_5XX}

      # Atipay Configuration
      ATIPAY_API_KEY: ${ATIPAY_API_KEY}
      ATIPAY_TERMINAL: ${ATIPAY_TERMINAL}

      ADMIN_MOBILE: ${ADMIN_MOBILE}
      ADMIN_DEPOSIT_REVIEWER: ${ADMIN_DEPOSIT_REVIEWER}
      ADMIN_2FA_MOBILES: ${ADMIN_2FA_MOBILES}
      ADMIN_OTP_BYPASS_MOBILES: ${ADMIN_OTP_BYPASS_MOBILES}
      ADMIN_LOGIN_OTP_FORWARD_MOBILE: ${ADMIN_LOGIN_OTP_FORWARD_MOBILE}
      SYSTEM_USER_UUID: ${SYSTEM_USER_UUID}
      TAX_USER_UUID: ${TAX_USER_UUID}
      SYSTEM_USER_MOBILE: ${SYSTEM_USER_MOBILE}
      TAX_USER_MOBILE: ${TAX_USER_MOBILE}
      SYSTEM_USER_EMAIL: ${SYSTEM_USER_EMAIL}
      TAX_USER_EMAIL: ${TAX_USER_EMAIL}
      SYSTEM_WALLET_UUID: ${SYSTEM_WALLET_UUID}
      TAX_WALLET_UUID: ${TAX_WALLET_UUID}
      SYSTEM_SHEBA_NUMBER: ${SYSTEM_SHEBA_NUMBER}
      IR_HTTPS_PROXY: ${IR_HTTPS_PROXY}

      # PayamSMS Configuration
      PAYAM_SMS_TOKEN_URL: ${PAYAM_SMS_TOKEN_URL}
      PAYAM_SMS_SYSTEM_NAME: ${PAYAM_SMS_SYSTEM_NAME}
      PAYAM_SMS_USERNAME: ${PAYAM_SMS_USERNAME}
      PAYAM_SMS_PASSWORD: ${PAYAM_SMS_PASSWORD}
      PAYAM_SMS_SCOPE: ${PAYAM_SMS_SCOPE}
      PAYAM_SMS_GRANT_TYPE: ${PAYAM_SMS_GRANT_TYPE}
      PAYAM_SMS_ROOT_ACCESS_TOKEN: ${PAYAM_SMS_ROOT_ACCESS_TOKEN}

      # Bale Configuration
      BALE_API_ACCESS_KEY: ${BALE_API_ACCESS_KEY}
      BALE_PROVIDER: ${BALE_PROVIDER}
      BALE_LEGACY_DOMAIN: ${BALE_LEGACY_DOMAIN}
      BALE_NAJVA_DOMAIN: ${BALE_NAJVA_DOMAIN}

      # Rubika Configuration
      RUBIKA_TOKEN: ${RUBIKA_TOKEN}
      RUBIKA_SERVICE_ID: ${RUBIKA_SERVICE_ID}
      RUBIKA_BASE_URL: ${RUBIKA_BASE_URL}

      # SPlus Configuration
      SPLUS_TOKEN: ${SPLUS_TOKEN}
      SPLUS_BASE_URL: ${SPLUS_BASE_URL}

      # Bot Configuration
      BOT_USERNAME: ${BOT_USERNAME}
      BOT_PASSWORD: ${BOT_PASSWORD}
      BOT_API_DOMAIN: ${BOT_API_DOMAIN}

      # Scheduler Configuration
      CAMPAIGN_EXECUTION_ENABLED: ${CAMPAIGN_EXECUTION_ENABLED}
      CAMPAIGN_EXECUTION_INTERVAL: ${CAMPAIGN_EXECUTION_INTERVAL}
      CAMPAIGN_MESSAGE_SEND_DELAY: ${CAMPAIGN_MESSAGE_SEND_DELAY}

      # Smart Tag Evaluation Configuration
      SMART_TAG_EVALUATION_ENABLED: ${SMART_TAG_EVALUATION_ENABLED}
      SMART_TAG_EVALUATION_SCHEDULER_ENABLED: ${SMART_TAG_EVALUATION_SCHEDULER_ENABLED}
      SMART_TAG_EVALUATION_SCHEDULER_POLL_INTERVAL: ${SMART_TAG_EVALUATION_SCHEDULER_POLL_INTERVAL}
      SMART_TAG_EVALUATION_SCHEDULER_MAX_PARALLEL_RUNS: ${SMART_TAG_EVALUATION_SCHEDULER_MAX_PARALLEL_RUNS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SMART_TAG_EVALUATION_OPENAI_API_KEY_ENV: ${SMART_TAG_EVALUATION_OPENAI_API_KEY_ENV}
      SMART_TAG_EVALUATION_OPENAI_BASE_URL: ${SMART_TAG_EVALUATION_OPENAI_BASE_URL}
      SMART_TAG_EVALUATION_OPENAI_MODEL: ${SMART_TAG_EVALUATION_OPENAI_MODEL}
      SMART_TAG_EVALUATION_OPENAI_REASONING_EFFORT: ${SMART_TAG_EVALUATION_OPENAI_REASONING_EFFORT}
      SMART_TAG_EVALUATION_OPENAI_MAX_OUTPUT_TOKENS: ${SMART_TAG_EVALUATION_OPENAI_MAX_OUTPUT_TOKENS}
      SMART_TAG_EVALUATION_OPENAI_TEMPERATURE: ${SMART_TAG_EVALUATION_OPENAI_TEMPERATURE}
      SMART_TAG_EVALUATION_OPENAI_TIMEOUT: ${SMART_TAG_EVALUATION_OPENAI_TIMEOUT}
      SMART_TAG_EVALUATION_OPENAI_MAX_RETRIES: ${SMART_TAG_EVALUATION_OPENAI_MAX_RETRIES}
      SMART_TAG_EVALUATION_OPENAI_HTTP_PROXY: ${SMART_TAG_EVALUATION_OPENAI_HTTP_PROXY}
      SMART_TAG_EVALUATION_BATCHING_TAG_BATCH_SIZE: ${SMART_TAG_EVALUATION_BATCHING_TAG_BATCH_SIZE}
      SMART_TAG_EVALUATION_VALIDATION_REQUIRE_EXACT_TAG_COUNT: ${SMART_TAG_EVALUATION_VALIDATION_REQUIRE_EXACT_TAG_COUNT}
      SMART_TAG_EVALUATION_VALIDATION_REQUIRE_EXACT_TAG_IDS: ${SMART_TAG_EVALUATION_VALIDATION_REQUIRE_EXACT_TAG_IDS}

      # Crypto Configuration
      CRYPTO_DEFAULT_PLATFORM: ${CRYPTO_DEFAULT_PLATFORM}
      CRYPTO_SUPPORTED_COINS: ${CRYPTO_SUPPORTED_COINS}
      OXA_BASE_URL: ${OXA_BASE_URL}
      OXA_API_KEY: ${OXA_API_KEY}
      OXA_TIMEOUT: ${OXA_TIMEOUT}

      # Message Configuration
      MESSAGE_SIGNUP_VERIFICATION_CODE_TEMPLATE: ${MESSAGE_SIGNUP_VERIFICATION_CODE_TEMPLATE}
      MESSAGE_SIGNIN_VERIFICATION_CODE_TEMPLATE: ${MESSAGE_SIGNIN_VERIFICATION_CODE_TEMPLATE}
      MESSAGE_OTP_RESEND_VERIFICATION_CODE_TEMPLATE: ${MESSAGE_OTP_RESEND_VERIFICATION_CODE_TEMPLATE}
      MESSAGE_PASSWORD_RESET_VERIFICATION_CODE_TEMPLATE: ${MESSAGE_PASSWORD_RESET_VERIFICATION_CODE_TEMPLATE}
      MESSAGE_CAMPAIGN_REJECTED_TEMPLATE: ${MESSAGE_CAMPAIGN_REJECTED_TEMPLATE}
      MESSAGE_DEPOSIT_RECEIPT_SUBMITTED_TEMPLATE: ${MESSAGE_DEPOSIT_RECEIPT_SUBMITTED_TEMPLATE}
      MESSAGE_INVOICE_ISSUE_REQUEST_TEMPLATE: ${MESSAGE_INVOICE_ISSUE_REQUEST_TEMPLATE}

    volumes:
      - app_logs_beta:/var/log/yamata
      - uploads_beta:/data
      - type: bind
        source: ./SMART_TAG_EVALUATION_PERSONA_ANALYSIS_SYSTEM_PROMPT
        target: /SMART_TAG_EVALUATION_PERSONA_ANALYSIS_SYSTEM_PROMPT
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./SMART_TAG_EVALUATION_TAG_SCORING_SYSTEM_PROMPT
        target: /SMART_TAG_EVALUATION_TAG_SCORING_SYSTEM_PROMPT
        read_only: true
        bind:
          create_host_path: false
    # ports:
    #   - "127.0.0.1:8080:8080"  # Only accessible from localhost
    #   - "127.0.0.1:9090:9090"  # Metrics port
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.20
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "--noproxy",
          "localhost",
          "http://localhost:8080/api/v1/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache
    user: "appuser"

  # Nginx Reverse Proxy
  nginx-beta:
    build:
      context: docker/nginx
      dockerfile: Dockerfile.edge
    image: yamata-nginx-beta
    container_name: yamata-nginx-beta
    restart: unless-stopped
    depends_on:
      app-beta:
        condition: service_healthy
      frontend-beta:
        condition: service_healthy
    volumes:
      - ./docker/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./docker/nginx/sites-available/generated/beta:/etc/nginx/sites-available:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/security.conf:/etc/nginx/security.conf:ro
      - ./docker/nginx/gzip.conf:/etc/nginx/gzip.conf:ro
      - ./docker/nginx/proxy.conf:/etc/nginx/proxy.conf:ro
      - nginx_logs_beta:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro # Let's Encrypt certificates
      - ./docker/nginx/public:/var/www/jaazebeh:ro # Static site root for jaazebeh.ir
    ports:
      - "80:80"
      - "443:443"
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.30
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "--noproxy",
          "app-beta",
          "http://app-beta:8080/api/v1/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=65534,gid=65534,mode=0750
      - /var/run
      - /tmp

  nginx-sentry-forwarder-beta:
    image: python:3.12-alpine
    container_name: yamata-nginx-sentry-forwarder-beta
    restart: unless-stopped
    depends_on:
      - nginx-beta
      - sentry-beta
    command: ["python", "/app/nginx_sentry_forwarder.py"]
    environment:
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
      SENTRY_RELEASE: ${SENTRY_RELEASE}
      SENTRY_SERVER_NAME: nginx-beta
      SENTRY_TIMEOUT_SECONDS: 5
      SENTRY_PUBLIC_BASE_URL: https://${DOMAIN}
      SENTRY_UI_DOMAIN: ${SENTRY_UI_DOMAIN}
      NGINX_ACCESS_LOG: /var/log/nginx/access.log
      NGINX_ERROR_LOG: /var/log/nginx/error.log
      NGINX_LOG_POLL_INTERVAL_SECONDS: 0.5
    volumes:
      - ./scripts/nginx_sentry_forwarder.py:/app/nginx_sentry_forwarder.py:ro
      - nginx_logs_beta:/var/log/nginx:ro
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.31
    security_opt:
      - no-new-privileges:true

  cert-monitor-beta:
    image: yamata-cert-monitor-beta
    container_name: yamata-cert-monitor-beta
    restart: unless-stopped
    depends_on:
      nginx-beta:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      CERT_ALERT_PHONE: ${CERT_ALERT_PHONE}
      CERT_ALERT_THRESHOLD_DAYS: ${CERT_ALERT_THRESHOLD_DAYS:-7}
      CERT_ALERT_CONF_PATH: /etc/nginx/sites-available/yamata-beta.conf
      CERT_ALERT_CERT_PATHS: ${CERT_ALERT_CERT_PATHS:-}
      SMS_PROVIDER_DOMAIN: ${SMS_PROVIDER_DOMAIN}
      SMS_API_KEY: ${SMS_API_KEY}
      SMS_SOURCE_NUMBER: ${SMS_SOURCE_NUMBER}
      SMS_RETRY_COUNT: ${SMS_RETRY_COUNT}
      SMS_VALIDITY_PERIOD: ${SMS_VALIDITY_PERIOD}
      SMS_TIMEOUT: ${SMS_TIMEOUT}
    volumes:
      - ./scripts/cert_monitor.py:/app/cert_monitor.py:ro
      - ./docker/nginx/sites-available/yamata-beta.conf:/etc/nginx/sites-available/yamata-beta.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: ["python", "/app/cert_monitor.py"]
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.90
    tmpfs:
      - /tmp

  # Prometheus (Optional - for monitoring)
  prometheus-beta:
    image: prom/prometheus:v3.5.0
    container_name: yamata-prometheus-beta
    restart: unless-stopped
    volumes:
      - prometheus_data_beta:/prometheus
      - ./docker/prometheus_config.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
    # ports:
    #   - "127.0.0.1:9091:9090"  # Only accessible from localhost
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.40
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    security_opt:
      - no-new-privileges:true
    user: "65534:65534" # nobody user

  # Grafana (Optional - for monitoring dashboards)
  grafana-beta:
    image: grafana/grafana:12.1.0-ubuntu
    container_name: yamata-grafana-beta
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SECURITY_COOKIE_SECURE: true
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: true
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/yamata-overview.json
      GF_SERVER_ROOT_URL: "https://${MONITORING_DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data_beta:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    # ports:
    #   - "127.0.0.1:3000:3000"  # Only accessible from localhost
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.50
    depends_on:
      - prometheus-beta
    security_opt:
      - no-new-privileges:true
    user: "472:472" # grafana user

  # Postgres Exporter for DB metrics
  postgres-exporter-beta:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: yamata-postgres-exporter-beta
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER}:${DB_PASSWORD}@postgres-beta:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSL_MODE}
      # Optional config file for custom metrics; bind if provided
    volumes:
      - ./docker/postgres_exporter/postgres_exporter.yml:/postgres_exporter.yml:ro
    depends_on:
      postgres-beta:
        condition: service_healthy
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.61

  # Node Exporter for host metrics
  node-exporter-beta:
    image: prom/node-exporter:v1.10.2
    container_name: yamata-node-exporter-beta
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.70

  # cAdvisor for container metrics
  cadvisor-beta:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: yamata-cadvisor-beta
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.80

  frontend-beta:
    image: yamata-frontend-beta
    container_name: frontend-beta
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REACT_APP_PRODUCTION_DOMAIN=${DOMAIN:-jazebeh.ir}
      - REACT_APP_ENABLE_ANALYTICS=true
      - REACT_APP_PRIMARY_COLOR=#2563eb
      - REACT_APP_THEME=light
      - REACT_APP_DEFAULT_LANGUAGE=en
      - REACT_APP_SUPPORTED_LANGUAGES=en,fa
    volumes:
      - ./docker/nginx/frontend.conf:/etc/nginx/nginx.conf:ro
      - frontend_logs_beta:/var/log/nginx
      - frontend_logs_beta:/app/logs
    networks:
      yamata-network-beta:
        ipv4_address: 172.30.0.60
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=0750
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-beta.rule=Host(`${DOMAIN:-jazebeh.ir}`)"
      - "traefik.http.routers.frontend-beta.entrypoints=websecure"
      - "traefik.http.routers.frontend-beta.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend-beta.loadbalancer.server.port=80"
